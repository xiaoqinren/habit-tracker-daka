        body {

            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);

        .container {
            width: 100%;
            max-width: 800px;
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        .task-group {
            margin-bottom: 30px;
        }

        .task-group h2 {
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 10px;
            color: #388E3C;
            font-size: 1.5em;
        }

        .task-list {
            list-style: none;
            padding: 0;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            margin-bottom: 10px;
            background-color: #FAFAFA;
            border-radius: 8px;
            transition: transform 0.2s, background-color 0.2s;
            border-left: 5px solid var(--secondary-color);
        }

        .task-item:hover {
            transform: translateY(-2px);
            background-color: #F5F5F5;
        }

        .task-text {
            font-size: 1.1em;
            flex-grow: 1;
            margin-right: 20px;
        }

        .task-time {
            color: #757575;
            font-size: 0.9em;
            margin-right: 20px;
            min-width: 60px;
        }

        /* 鑷畾涔夊閫夋 */
        .checkbox-wrapper {
            display: flex;
            align-items: center;
        }

        input[type="checkbox"] {
            display: none;
        }

        .checkmark {
            width: 30px;
            height: 30px;
            background-color: #EEE;
            border-radius: 50%;
            display: inline-block;
            position: relative;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        input[type="checkbox"]:checked+.checkmark {
            background-color: var(--primary-color);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
            left: 10px;
            top: 5px;
            width: 8px;
            height: 15px;
            border: solid white;
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
        }

        input[type="checkbox"]:checked+.checkmark:after {
            display: block;
        }

        /* 杩涘害鎻愮ず */
        .progress-section {
            margin-top: 40px;
            text-align: center;
            padding: 20px;
            background-color: #E8F5E9;
            border-radius: 10px;
        }

        .progress-text {
            font-size: 1.2em;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        .reset-btn {
            background-color: #81C784;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .reset-btn:hover {
            background-color: #66BB6A;
        }

        /* 鍒掔嚎鍔ㄧ敾 */
        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #9E9E9E;
            transition: all 0.3s ease;
        }

        .tts-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            margin-left: 10px;
            padding: 5px;
            border-radius: 50%;
            transition: background-color 0.2s;
        }

        .tts-btn:hover {
            background-color: #f0f0f0;
        }

        /* 缁冧範鎸夐挳 */
        .exercise-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background-color 0.3s, transform 0.2s;
            margin-right: 10px;
        }

        .exercise-btn:hover {
            background-color: #388E3C;
            transform: translateY(-2px);
        }

        .exercise-btn:disabled {
            background-color: #A5D6A7;
            cursor: not-allowed;
            transform: none;
        }

        /* 寮圭獥鏍峰紡 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--background-color);
            padding-bottom: 10px;

        .modal-title {
            font-size: 1.5em;
            color: var(--primary-color);

        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #757575;
        }

        .exercise-container {
            margin-bottom: 20px;

        .exercise-input {

            border-radius: 5px;
            margin-top: 10px;

        }

        .exercise-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .feedback {
            margin-top: 10px;

            min-height: 24px;
        }

        .feedback.success {

        .submit-btn {

            font-size: 1.1em;

        .profile-switcher {

            box-shadow: 0 4px 6px rgba(76, 175, 80, 0.3);

</head>

        function saveProgress() {
            const checkboxes = document.querySelectorAll('.task-item[style*="display: flex"] input[type="checkbox"], .task-item:not([style*="display: none"]) input[type="checkbox"]');
            const state = Array.from(checkboxes).map(cb => cb.checked);

            // Save state based on current profile
            const storageKey = `habitTrackerState_${currentProfile}`;
            localStorage.setItem(storageKey, JSON.stringify(state));

            // 璁板綍鏈€鍚庢墦鍗℃棩鏈燂紝鐢ㄤ簬璺ㄥぉ鑷姩閲嶇疆
            localStorage.setItem(`lastDate_${currentProfile}`, new Date().toDateString());
        }

        function loadProgress() {
            const storageKey = `habitTrackerState_${currentProfile}`;
            const lastDateKey = `lastDate_${currentProfile}`;
            const savedState = JSON.parse(localStorage.getItem(storageKey));
            const lastDate = localStorage.getItem(lastDateKey);
            const today = new Date().toDateString();

            // First, reset the UI visual state completely before loading
            const checkboxes = document.querySelectorAll('.task-item[style*="display: flex"] input[type="checkbox"], .task-item:not([style*="display: none"]) input[type="checkbox"]');
            checkboxes.forEach(cb => {
                cb.checked = false;
                const listItem = cb.closest('.task-item');
                listItem.classList.remove('completed');

                // Reset special exercise items
                if (listItem.id === 'task-math-calc' || listItem.id === 'task-english-vocab' || listItem.id === 'task-habit-reading' || listItem.id === 'task-english-read' || listItem.id === 'task-chinese-foundation') {
                    cb.disabled = true;
                    cb.nextElementSibling.style.cursor = 'not-allowed';
                    cb.nextElementSibling.style.backgroundColor = '#f0f0f0';
                    cb.nextElementSibling.title = '璇峰厛鐐瑰嚮宸︿晶鎸夐挳瀹屾垚鎸戞垬';

                    const btn = listItem.querySelector('.exercise-btn');
                    if (btn) {
                        btn.disabled = false;
                        if (listItem.id === 'task-math-calc') btn.innerText = '寮€濮嬬畻鏈?;
                        else if (listItem.id === 'task-chinese-foundation') btn.innerText = '寮€濮嬬粌瀛?;
                        else if (listItem.id === 'task-english-vocab') btn.innerText = '寮€濮嬭儗璇?;
                        else if (listItem.id === 'task-habit-reading') btn.innerText = '寮€濮嬮槄璇?;
                        else if (listItem.id === 'task-english-read') btn.innerText = '寮€濮嬬（鑰虫湹';
                    }
                }
            });

            // Optionally reset timer UI
            const timerDisplay = document.getElementById('timerDisplay');
            if (timerDisplay) timerDisplay.innerText = '20:00';
            const focusBtn = document.getElementById('startFocusBtn');
            if (focusBtn) {
                focusBtn.disabled = false;
                focusBtn.innerText = '寮€濮?0鍖轰笓娉?;
            }

            // 濡傛灉鏄柊鐨勪竴澶╋紝鑷姩閲嶇疆锛堜笉寮圭獥锛?
            if (lastDate && lastDate !== today) {
                // Do nothing more, leaving it in the reset state
                saveProgress(); // Save the reset state for the new day
                updateProgressText();
                return;
            }

            if (savedState) {
                // Only get visible checkboxes for restoring state
                const visibleCheckboxes = document.querySelectorAll('.task-item[style*="display: flex"] input[type="checkbox"], .task-item:not([style*="display: none"]) input[type="checkbox"]');
                visibleCheckboxes.forEach((cb, index) => {
                    // Safety check if DOM changed vs saved state
                    if (index < savedState.length) {
                        cb.checked = savedState[index];
                        if (cb.checked) {
                            const listItem = cb.closest('.task-item');
                            listItem.classList.add('completed');

                            // Handle special exercise items visual restore
                            if (listItem.id === 'task-math-calc' || listItem.id === 'task-english-vocab' || listItem.id === 'task-habit-reading' || listItem.id === 'task-english-read' || listItem.id === 'task-chinese-foundation') {
                                cb.disabled = false;
                                cb.nextElementSibling.style.cursor = 'pointer';
                                cb.nextElementSibling.style.backgroundColor = '';
                                cb.nextElementSibling.title = '';

                                const btn = listItem.querySelector('.exercise-btn');
                                if (btn) {
                                    btn.innerText = '宸插畬鎴?;
                                    btn.disabled = true;
                                }
                            }
                        }
                    }
                });
            }
            updateProgressText();
        }

        // 绠€鍗曠殑绮掑瓙鐗规晥鎺夎惤 (鏇夸唬 confetti 搴擄紝淇濇寔鍗曟枃浠?
        function createConfetti(element) {
            const rect = element.getBoundingClientRect();
            const colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3', '#03a9f4', '#00bcd4', '#009688', '#4CAF50', '#8BC34A', '#CDDC39', '#FFEB3B', '#FFC107', '#FF9800', '#FF5722'];

            for (let i = 0; i < 10; i++) {
                const confetto = document.createElement('div');
                confetto.style.position = 'fixed';
                confetto.style.width = '8px';
                confetto.style.height = '8px';
                confetto.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetto.style.left = (rect.left + 15) + 'px';
                confetto.style.top = (rect.top + 15) + 'px';
                confetto.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetto.style.zIndex = '1000';
                confetto.style.pointerEvents = 'none';
                document.body.appendChild(confetto);

                const angle = Math.random() * Math.PI * 2;
                const velocity = 50 + Math.random() * 50;
                const tx = Math.cos(angle) * velocity;
                const ty = -Math.abs(Math.sin(angle)) * velocity - 20; // 鍚戜笂鎶?

                confetto.animate([
                    { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) rotate(${Math.random() * 360}deg)`, opacity: 0 }
                ], {
                    duration: 600 + Math.random() * 400,
                    easing: 'cubic-bezier(0, .9, .57, 1)'
                }).onfinish = () => confetto.remove();
            }
        }
